# Nexus Agent — Docker image build & publish to GHCR
#
# Triggers:
#   - push of `nexus-v*` tag  → publishes `:1.0.0-beta` + `:latest` (stable)
#   - workflow_dispatch        → manual rebuild
#
# Output:
#   ghcr.io/wjb12387767/nexus-agent:<version>
#   ghcr.io/wjb12387767/nexus-agent:latest  (tag pushes only)
#
# Architecture: linux/amd64 only.
# (arm64 cross-compiled via QEMU was tried and ran out of disk on the GitHub
#  runner — the Rust NAPI compilation + node_modules install needs ~20 GB,
#  and the runner has 14 GB. Native arm64 runners would fix this but cost
#  money; revisit when there's real arm64 demand.)

name: Docker Publish

on:
  push:
    tags:
      - "nexus-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. 1.0.0-beta). If empty, uses commit SHA."
        required: false
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub runners have 14 GB of disk. The Nexus build needs ~20 GB
      # (Rust NAPI compilation + node_modules with onnxruntime-node ~1 GB +
      # @ts-morph/common + puppeteer browsers). Free up space by removing
      # pre-installed toolchains we don't use.
      - name: Free up disk space on the runner
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true       # ~2 GB of cached tools
          android: true          # ~9 GB of Android SDK
          dotnet: true           # ~1.5 GB
          haskell: true          # ~1 GB
          large-packages: false  # keep docker, buildx, etc.
          docker-images: false   # keep base images for caching
          swap-storage: false    # keep swap

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag strategy:
          #   nexus-v1.0.0-beta  → 1.0.0-beta, latest
          #   manual dispatch    → <input> or sha-<short>
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/nexus-v') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'workflow_dispatch' && inputs.version == '' }}
          labels: |
            org.opencontainers.image.title=Nexus Agent
            org.opencontainers.image.description=Open-source AI coding agent — fusion of omp, Grok Build, and OpenClaude
            org.opencontainers.image.source=https://github.com/wjb12387767/nexus-agent
            org.opencontainers.image.licenses=MIT

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache between runs to speed up incremental builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arg passthrough.
          build-args: |
            BUN_VERSION=1.3.14

      - name: Summary
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          echo "### Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: ghcr.io/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags:  ${IMAGE_TAGS}" >> $GITHUB_STEP_SUMMARY
          echo "Arch:  linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo '```sh' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

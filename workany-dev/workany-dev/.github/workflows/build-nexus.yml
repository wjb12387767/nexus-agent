name: Build Nexus WorkAny

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-api/**"
      - "src-tauri/**"
      - "scripts/build-nexus.sh"
      - "package.json"
      - ".github/workflows/build-nexus.yml"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - windows
          - macos-arm64
          - macos-intel
      with_nexus:
        description: "Build and bundle nexus-agent CLI"
        required: false
        default: true
        type: boolean

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # nexus-agent source repository (sibling checkout in CI)
  NEXUS_AGENT_REPO: wjb12387767/nexus-agent

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bun_api_target: bun-linux-x64
            nexus_cross_target: linux-x64
            name: linux-x86_64

          - platform: windows
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bun_api_target: bun-windows-x64
            nexus_cross_target: win32-x64
            name: windows-x86_64

          - platform: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            bun_api_target: bun-darwin-arm64
            nexus_cross_target: darwin-arm64
            name: macos-arm64

          - platform: macos-intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            bun_api_target: bun-darwin-x64
            nexus_cross_target: darwin-x64
            name: macos-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check platform filter
        id: check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.platform }}" != "all" && "${{ github.event.inputs.platform }}" != "${{ matrix.platform }}" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping ${{ matrix.platform }} (selected: ${{ github.event.inputs.platform }})"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Building ${{ matrix.platform }}"
          fi

      - name: Checkout WorkAny repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Checkout nexus-agent repository
        if: steps.check.outputs.skip != 'true' && github.event.inputs.with_nexus != 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.NEXUS_AGENT_REPO }}
          path: nexus-agent
          fetch-depth: 1

      - name: Install dependencies (Linux)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 file
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: steps.check.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Bun
        if: steps.check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get pnpm store directory
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        if: steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Rust cache
        if: steps.check.outputs.skip != 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: nexus-${{ matrix.name }}

      - name: Install frontend dependencies
        if: steps.check.outputs.skip != 'true'
        run: pnpm install

      - name: Build nexus-agent CLI
        if: steps.check.outputs.skip != 'true' && github.event.inputs.with_nexus != 'false'
        shell: bash
        run: |
          cd nexus-agent
          bun install
          # Cross-compile the nexus CLI binary for the target platform
          CROSS_TARGET="${{ matrix.nexus_cross_target }}" bun --cwd=packages/coding-agent run build
          # Verify the binary was produced
          ls -la packages/coding-agent/dist/

      - name: Copy nexus CLI into WorkAny sidecar directory
        if: steps.check.outputs.skip != 'true' && github.event.inputs.with_nexus != 'false'
        shell: bash
        run: |
          mkdir -p src-api/dist
          NEXUS_SRC="nexus-agent/packages/coding-agent/dist/nexus-${{ matrix.nexus_cross_target }}"
          NEXUS_DST="src-api/dist/nexus-${{ matrix.rust_target }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            NEXUS_DST="${NEXUS_DST}.exe"
          fi
          if [ ! -f "$NEXUS_SRC" ]; then
            echo "WARN: nexus binary not found at $NEXUS_SRC, trying native name"
            NEXUS_SRC="nexus-agent/packages/coding-agent/dist/nexus"
          fi
          cp "$NEXUS_SRC" "$NEXUS_DST"
          chmod +x "$NEXUS_DST" 2>/dev/null || true
          echo "Copied nexus CLI to $NEXUS_DST"

      - name: Build workany-api sidecar (Unix)
        if: steps.check.outputs.skip != 'true' && matrix.platform != 'windows'
        shell: bash
        run: |
          cd src-api
          mkdir -p dist
          bun build src/index.ts --compile --target=${{ matrix.bun_api_target }} --outfile dist/workany-api-${{ matrix.rust_target }}

      - name: Build workany-api sidecar (Windows)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'windows'
        shell: bash
        run: |
          cd src-api
          mkdir -p dist
          bun build src/index.ts --compile --target=${{ matrix.bun_api_target }} --outfile dist/workany-api-${{ matrix.rust_target }}.exe

      - name: Build frontend
        if: steps.check.outputs.skip != 'true'
        run: pnpm build

      - name: Build Tauri app (Linux - skip AppImage)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.rust_target }} --bundles deb,rpm

      - name: Build Tauri app (Windows/macOS)
        if: steps.check.outputs.skip != 'true' && matrix.platform != 'linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.rust_target }}

      - name: Upload artifacts (Linux)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: NexusWorkAny-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
          if-no-files-found: ignore

      - name: Upload artifacts (Windows)
        if: steps.check.outputs.skip != 'true' && matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: NexusWorkAny-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: Upload artifacts (macOS)
        if: steps.check.outputs.skip != 'true' && startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: NexusWorkAny-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.release == 'true'

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: |
          ls -R artifacts
          echo "---"
          find artifacts -type f -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" | head -20

      - name: Checkout for version
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./repo/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          tag_name: v${{ steps.version.outputs.version }}
          name: Nexus WorkAny v${{ steps.version.outputs.version }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
